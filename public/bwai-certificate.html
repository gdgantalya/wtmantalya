<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Katılım Belgesi — Build with AI 2026 Antalya</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #0d0d1a;
        color: #fff;
        font-family: 'Segoe UI', sans-serif;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        background: #16162a;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 20px;
        padding: 40px 36px;
        width: 100%;
        max-width: 460px;
        text-align: center;
      }

      h1 {
        font-size: 22px;
        font-weight: 700;
        margin-bottom: 6px;
        color: #fff;
      }

      .subtitle {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.45);
        margin-bottom: 32px;
      }

      .input-group {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 16px;
      }

      input {
        background: #0d0d1a;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        padding: 14px 16px;
        color: #fff;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
      }

      input:focus {
        border-color: #fbbc04;
      }

      input::placeholder {
        color: rgba(255, 255, 255, 0.25);
      }

      .btn {
        width: 100%;
        padding: 14px;
        border-radius: 10px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition:
          opacity 0.2s,
          transform 0.1s;
        margin-top: 8px;
      }

      .btn:active {
        transform: scale(0.98);
      }

      .btn-primary {
        background: linear-gradient(135deg, #fbbc04, #f29900);
        color: #1a1a1a;
      }

      .btn-primary:hover {
        opacity: 0.9;
      }
      .btn-primary:disabled {
        opacity: 0.4;
        cursor: not-allowed;
        transform: none;
      }

      .btn-download {
        background: linear-gradient(135deg, #34a853, #2d8f47);
        color: #fff;
        display: none;
      }

      .message {
        margin-top: 16px;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 13px;
        display: none;
      }

      .message.success {
        background: rgba(52, 168, 83, 0.15);
        border: 1px solid rgba(52, 168, 83, 0.3);
        color: #34a853;
        display: block;
      }

      .message.error {
        background: rgba(234, 67, 53, 0.15);
        border: 1px solid rgba(234, 67, 53, 0.3);
        color: #ea4335;
        display: block;
      }

      .preview-wrap {
        margin-top: 24px;
        display: none;
        border-radius: 12px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .preview-wrap img {
        width: 100%;
        display: block;
      }

      canvas {
        display: none;
      }

      .gdg-dots {
        display: flex;
        gap: 5px;
        justify-content: center;
        margin-bottom: 16px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      footer {
        margin-top: 32px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.2);
      }
    </style>
  </head>

      function kontrol() {
        const isim = document.getElementById('inputIsim').value.trim()
        const soyisim = document.getElementById('inputSoyisim').value.trim()
        const preview = document.getElementById('previewWrap')
        const btnIndir = document.getElementById('btnIndir')

        if (!isim || !soyisim) {
          showMsg('Lütfen adın ve soyadını gir.', 'error')
          preview.style.display = 'none'
          btnIndir.style.display = 'none'
          return
        }

        const ad = isim.charAt(0).toLocaleUpperCase('tr-TR') + isim.slice(1)
        const soyad =
          soyisim.charAt(0).toLocaleUpperCase('tr-TR') + soyisim.slice(1)
        currentName = `${ad} ${soyad}`
        showMsg(`✅ Hoş geldin, ${currentName}! Sertifikan hazır.`, 'success')
        olusturOnizleme(currentName)
      }

      function olusturOnizleme(ad) {
        const canvas = document.getElementById('certCanvas')
        const ctx = canvas.getContext('2d')
        const img = new Image()
        img.onload = () => {
          canvas.width = img.width
          canvas.height = img.height
          ctx.drawImage(img, 0, 0)

          const x = img.width * NAME_X
          const y = img.height * NAME_Y
          const fontSize = Math.round(img.width * 0.032)

          ctx.font = `bold ${fontSize}px 'Segoe UI', 'Helvetica', sans-serif`
          ctx.fillStyle = '#ffffff'
          ctx.textAlign = 'left'
          ctx.textBaseline = 'middle'
          ctx.fillText(ad, x, y)

          const dataUrl = canvas.toDataURL('image/png')
          const previewImg = document.getElementById('previewImg')
          previewImg.src = dataUrl
          document.getElementById('previewWrap').style.display = 'block'
          document.getElementById('btnIndir').style.display = 'block'
        }
        img.src = CERT_IMG
      }

      function indir() {
        const { jsPDF } = window.jspdf
        const canvas = document.getElementById('certCanvas')
        const imgData = canvas.toDataURL('image/jpeg', 0.92)

        const pdf = new jsPDF({
          orientation: 'landscape',
          unit: 'mm',
          format: 'a4',
        })
        const W = pdf.internal.pageSize.getWidth()
        const H = pdf.internal.pageSize.getHeight()
        pdf.addImage(imgData, 'JPEG', 0, 0, W, H)

        const dosyaAdi = `BuildWithAI-2026-${currentName.replace(/ /g, '-')}.pdf`
        pdf.save(dosyaAdi)
      }

      function showMsg(text, type) {
        const el = document.getElementById('message')
        el.textContent = text
        el.className = `message ${type}`
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') kontrol()
      })
