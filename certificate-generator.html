<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Katılım Belgen — IWD 2026 Antalya</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #0d0d1a;
    color: #fff;
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #16162a;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 20px;
    padding: 40px 36px;
    width: 100%;
    max-width: 460px;
    text-align: center;
  }

  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  .logo-row img {
    height: 32px;
    object-fit: contain;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #fff;
  }

  .subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.45);
    margin-bottom: 32px;
  }

  .input-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
  }

  input {
    background: #0d0d1a;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 14px 16px;
    color: #fff;
    font-size: 15px;
    outline: none;
    transition: border-color .2s;
  }

  input:focus {
    border-color: #4285F4;
  }

  input::placeholder {
    color: rgba(255,255,255,0.25);
  }

  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    margin-top: 8px;
  }

  .btn:active { transform: scale(0.98); }

  .btn-primary {
    background: linear-gradient(135deg, #4285F4, #1a6cf5);
    color: #fff;
  }

  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .btn-download {
    background: linear-gradient(135deg, #34A853, #2d8f47);
    color: #fff;
    display: none;
  }

  .message {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    display: none;
  }

  .message.success {
    background: rgba(52, 168, 83, 0.15);
    border: 1px solid rgba(52, 168, 83, 0.3);
    color: #34A853;
    display: block;
  }

  .message.error {
    background: rgba(234, 67, 53, 0.15);
    border: 1px solid rgba(234, 67, 53, 0.3);
    color: #ea4335;
    display: block;
  }

  .preview-wrap {
    margin-top: 24px;
    display: none;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .preview-wrap img {
    width: 100%;
    display: block;
  }

  canvas { display: none; }

  .gdg-dots {
    display: flex;
    gap: 5px;
    justify-content: center;
    margin-bottom: 16px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  footer {
    margin-top: 32px;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
  }
</style>
</head>

// İsim X/Y pozisyonu (2000x1414 görsele göre)
const NAME_X = 0.50;  // %50 - yatay merkez
const NAME_Y = 0.435; // %38.5 - noktalı çizgi üzeri

let currentName = '';

function normalize(str) {
  return str.trim().toLowerCase()
    .replace(/ğ/g,'g').replace(/ü/g,'u').replace(/ş/g,'s')
    .replace(/ı/g,'i').replace(/ö/g,'o').replace(/ç/g,'c')
    .replace(/İ/g,'i').replace(/Ğ/g,'g').replace(/Ü/g,'u')
    .replace(/Ş/g,'s').replace(/Ö/g,'o').replace(/Ç/g,'c');
}

function kontrol() {
  const isim = document.getElementById('inputIsim').value.trim();
  const soyisim = document.getElementById('inputSoyisim').value.trim();
  const msg = document.getElementById('message');
  const preview = document.getElementById('previewWrap');
  const btnIndir = document.getElementById('btnIndir');

  if (!isim || !soyisim) {
    showMsg('Lütfen adını ve soyadını gir.', 'error');
    return;
  }

  const bulunan = KATILIMCILAR.find(k =>
    normalize(k.isim) === normalize(isim) &&
    normalize(k.soyisim) === normalize(soyisim)
  );

  if (!bulunan) {
    showMsg('⚠️ Kayıtlı katılımcılar arasında bulunamadın. İsim veya soyisim hatalı olabilir.', 'error');
    preview.style.display = 'none';
    btnIndir.style.display = 'none';
    return;
  }

  currentName = `${bulunan.isim} ${bulunan.soyisim}`;
  showMsg(`✅ Hoş geldin, ${currentName}! Sertifikan hazır.`, 'success');
  olusturOnizleme(currentName);
}

function olusturOnizleme(ad) {
  const canvas = document.getElementById('certCanvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const x = img.width * NAME_X;
    const y = img.height * NAME_Y;
    const fontSize = Math.round(img.width * 0.038);

    ctx.font = `bold ${fontSize}px 'Georgia', serif`;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(ad, x, y);

    const dataUrl = canvas.toDataURL('image/png');
    const previewImg = document.getElementById('previewImg');
    previewImg.src = dataUrl;
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('btnIndir').style.display = 'block';
  };
  img.src = CERT_IMG;
}

function indir() {
  const { jsPDF } = window.jspdf;
  const canvas = document.getElementById('certCanvas');
  const imgData = canvas.toDataURL('image/jpeg', 0.92);

  // A4 yatay
  const pdf = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
  const W = pdf.internal.pageSize.getWidth();
  const H = pdf.internal.pageSize.getHeight();
  pdf.addImage(imgData, 'JPEG', 0, 0, W, H);

  const dosyaAdi = `IWD2026-${currentName.replace(/ /g,'-')}.pdf`;
  pdf.save(dosyaAdi);
}

function showMsg(text, type) {
  const el = document.getElementById('message');
  el.textContent = text;
  el.className = `message ${type}`;
}

// Enter tuşu desteği
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') kontrol();
});
